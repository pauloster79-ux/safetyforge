name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: cd backend && ruff check .
      - run: cd backend && ruff format --check .

  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install system deps for WeasyPrint
        run: sudo apt-get update && sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0
      - name: Install Python deps
        run: cd backend && pip install -r requirements.txt && pip install pytest pytest-asyncio httpx
      - name: Install and start Firestore emulator
        run: |
          curl -sL https://firebase.tools | bash
          firebase emulators:start --only firestore --project test-project &
          sleep 5
      - name: Run tests
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080
          GOOGLE_CLOUD_PROJECT: test-project
          ENVIRONMENT: test
          ANTHROPIC_API_KEY: test-key
        run: cd backend && pytest -v --tb=short

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npx tsc --noEmit
      - name: Build
        env:
          VITE_API_URL: https://api.safetyforge.com/api/v1
          VITE_FIREBASE_API_KEY: placeholder
          VITE_FIREBASE_AUTH_DOMAIN: placeholder
          VITE_FIREBASE_PROJECT_ID: placeholder
        run: cd frontend && npm run build
