federal:
  - id: canada_labour_code_part_ii
    short: CLC Part II
    full: Canada Labour Code Part II - Occupational Health and Safety
    applies_to: Federally regulated workplaces (interprovincial transport, telecommunications, banking, Crown corporations)
    sections:
      - id: s124
        title: Duty of employer
        summary: Every employer shall ensure that the health and safety at work of every person employed by the employer is protected
      - id: s125
        title: Specific duties of employer
        summary: Detailed list of employer obligations including hazard prevention, training, and provision of safety equipment
      - id: s126
        title: Duty of employees
        summary: Every employee shall take all reasonable and necessary precautions to ensure their own and others' health and safety
      - id: s128
        title: Right to refuse dangerous work
        summary: Employee may refuse to work if they have reasonable cause to believe a danger exists
      - id: s135
        title: Workplace health and safety committees
        summary: Requirement for health and safety committees in workplaces with 20 or more employees
      - id: s136
        title: Health and safety representatives
        summary: Requirement for health and safety representative in workplaces with fewer than 20 employees

  - id: criminal_code_s217_1
    short: Criminal Code s217.1
    full: Criminal Code of Canada s217.1 (Westray Act / Bill C-45)
    year: 2004
    summary: Every one who undertakes or has the authority to direct how another person does work or performs a task is under a legal duty to take reasonable steps to prevent bodily harm arising from that work
    notes: Allows criminal prosecution of organizations and individuals for workplace safety failures

