construction:
  fall_protection:
    general_trigger_height_metres: 3
    notes: Most provinces require fall protection at 3 metres (BC, AB, ON, QC, SK, MB, NS). Some situations trigger at lower heights (e.g., above open water, near openings).
    hierarchy:
      - Guardrails
      - Travel restraint system
      - Fall restricting system
      - Fall arrest system
      - Safety nets
    rescue_plan_required: true

  excavation:
    shoring_depth_metres: 1.2
    notes: Most provinces require shoring or sloping for excavations deeper than 1.2 metres
    requirements:
      - Competent person must inspect before entry
      - Locate underground utilities before digging
      - Maintain safe distance from edge for equipment and spoil pile
      - Means of egress within 8 metres of any worker

  confined_space:
    requirements:
      - Written confined space entry program
      - Hazard assessment before entry
      - Entry permit system
      - Atmospheric testing and monitoring
      - Trained standby person
      - Rescue plan and equipment

environmental:
  - id: noise_exposure
    short: Noise Exposure Limits
    standard: CSA Z107.56
    exposure_limit: {value: 85, unit: "dB(A)", period: "8-hour TWA"}
    notes: Most provinces adopt 85 dB(A) 8-hour TWA, some use 3 dB exchange rate, some use 5 dB

  - id: asbestos
    short: Asbestos Regulations
    exposure_limit: {value: 0.1, unit: "fibres/cc", period: "8-hour TWA"}
    notes: Provincial asbestos regulations vary but generally limit exposure to 0.1 f/cc

  - id: silica
    short: Silica Exposure
    exposure_limit: {value: 0.025, unit: "mg/m3", period: "8-hour TWA"}
    notes: Most provinces adopt ACGIH TLV of 0.025 mg/m3 for respirable crystalline silica

  - id: whmis
    short: WHMIS 2015
    full: Workplace Hazardous Materials Information System 2015
    alignment: GHS (Globally Harmonized System)
    requirements:
      - Safety Data Sheets (SDS) for all hazardous products
      - Supplier and workplace labels
      - Worker education and training

