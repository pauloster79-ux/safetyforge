canada_note: "MasterFormat is co-published by CSI (US) and CSC (Canada); the division/section codes and titles are identical in both jurisdictions. Canadian-specific variation is limited to: (a) metric dimensioning in specification prose rather than the taxonomy itself, and (b) Division 01 references to Canadian standards (CSA, NBC, provincial building codes) rather than US equivalents (ANSI, IBC). For the canonical category tree, the US and CA YAML files share identical codes and titles; jurisdiction divergence appears only when regulatory activity_refs are wired in a later phase."
